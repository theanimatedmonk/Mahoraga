<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      overflow: hidden;
    }

    .wheel-container {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheel-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      opacity: 0.85;
      transform-origin: 50% 50%;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #wheel-img.full-spin {
      transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .wheel-placeholder {
      width: 100px;
      height: 100px;
      border: 2px dashed #444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .wheel-placeholder:hover { border-color: #888; }

    .brand {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.connected { background: #22c55e; }
    .dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #status {
      font-size: 14px;
      font-weight: 500;
    }

    .hint {
      font-size: 11px;
      color: #666;
    }

    #disconnect-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      font-family: inherit;
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }
    #disconnect-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }
    
  </style>
</head>
<body>

  <div class="wheel-container" id="wheel-container">
    <img id="wheel-img" alt="wheel" onerror="this.style.display='none'; document.getElementById('wheel-placeholder').style.display='flex';" />
    <div class="wheel-placeholder" id="wheel-placeholder" style="display:none;" title="Put wheel.png in plugin/assets/">
      Place<br>wheel.png<br>in assets/
    </div>
  </div>

  <div class="brand">Mahoraga</div>

  <div class="status-row">
    <div id="dot" class="dot connecting"></div>
    <span id="status">Connecting...</span>
  </div>

  <div class="hint">Keep this window open</div>
  <button id="disconnect-btn">Disconnect</button>

    const wheelImg = document.getElementById('wheel-img');
    wheelImg.src = WHEEL_DATA;
    let currentRotation = 0;

    function spinWheel(degrees = 90) {
      if (!wheelImg || wheelImg.style.display === 'none') return;
      currentRotation += degrees;
      wheelImg.style.transform = `rotate(${currentRotation}deg)`;
    }

    function fullSpin() {
      if (!wheelImg || wheelImg.style.display === 'none') return;
      wheelImg.classList.add('full-spin');
      currentRotation += 360;
      wheelImg.style.transform = `rotate(${currentRotation}deg)`;
      setTimeout(() => wheelImg.classList.remove('full-spin'), 1300);
    }

    // ── WebSocket connection ──
    const PORTS = [3456, 3457, 3458, 3459, 3460];
    let ws = null;
    let reconnectTimer = null;
    let keepaliveTimer = null;
    const statusEl = document.getElementById('status');
    const dotEl = document.getElementById('dot');
    const disconnectBtn = document.getElementById('disconnect-btn');
    let manualDisconnect = false;

    function setStatus(text, state) {
      statusEl.textContent = text;
      dotEl.className = 'dot ' + state;
      disconnectBtn.style.display = state === 'connected' ? 'block' : 'none';
    }

    disconnectBtn.addEventListener('click', () => {
      manualDisconnect = true;
      clearTimeout(reconnectTimer);
      stopKeepalive();
      if (ws) { ws.onclose = null; ws.close(); ws = null; }
      setStatus('Disconnected', 'error');
      parent.postMessage({ pluginMessage: { type: 'disconnected' } }, '*');
      setTimeout(() => { manualDisconnect = false; }, 500);
    });

    function connectParallel() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      setStatus('Scanning...', 'connecting');
      let connected = false;
      const attempts = [];

      PORTS.forEach(port => {
        const url = `ws://127.0.0.1:${port}/plugin`;
        try {
          const socket = new WebSocket(url);
          attempts.push(socket);

          socket.onopen = () => {
            if (connected) { socket.close(); return; }
            connected = true;
            ws = socket;

            attempts.forEach(s => {
              if (s !== socket) {
                s.onclose = null;
                s.onerror = null;
                try { s.close(); } catch {}
              }
            });

            ws.onmessage = handleMessage;
            ws.onclose = handleClose;
            ws.onerror = handleClose;

            setStatus('Connected', 'connected');
            parent.postMessage({ pluginMessage: { type: 'connected' } }, '*');
            ws.send(JSON.stringify({ type: 'hello', mode: 'plugin', version: '1.3.0' }));
            startKeepalive();
            fullSpin();
          };

          socket.onclose = () => {};
          socket.onerror = () => {};
        } catch (e) {}
      });

      setTimeout(() => {
        if (!connected) {
          attempts.forEach(s => { s.onclose = null; try { s.close(); } catch {} });
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connectParallel, 300);
        }
      }, 1500);
    }

    function handleMessage(event) {
      try {
        const msg = JSON.parse(event.data);

        if (msg.action === 'eval') {
          parent.postMessage({
            pluginMessage: { type: 'eval', id: msg.id, code: msg.code }
          }, '*');
        }

        if (msg.action === 'eval-batch') {
          parent.postMessage({
            pluginMessage: { type: 'eval-batch', id: msg.id, codes: msg.codes }
          }, '*');
        }

        if (msg.action === 'ping') {
          ws.send(JSON.stringify({ type: 'pong', id: msg.id }));
        }

        if (msg.type === 'pong') {
          lastPong = Date.now();
        }

        // Wheel spin on drop save
        if (msg.action === 'wheel-spin') {
          spinWheel();
        }
      } catch (e) {
        console.error('Message parse error:', e);
      }
    }

    function handleClose() {
      if (manualDisconnect) return;
      if (ws && ws.readyState !== WebSocket.OPEN) {
        ws = null;
        setStatus('Reconnecting...', 'connecting');
        stopKeepalive();
        parent.postMessage({ pluginMessage: { type: 'disconnected' } }, '*');
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectParallel, 200);
      }
    }

    let lastPong = Date.now();

    function startKeepalive() {
      stopKeepalive();
      lastPong = Date.now();
      keepaliveTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          if (Date.now() - lastPong > 8000) {
            ws.close();
            return;
          }
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 3000);
    }

    function stopKeepalive() {
      if (keepaliveTimer) { clearInterval(keepaliveTimer); keepaliveTimer = null; }
    }

    function connect() { connectParallel(); }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'result') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'result', id: msg.id, result: msg.result, error: msg.error }));
        }
      }

      if (msg.type === 'batch-result') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'batch-result', id: msg.id, results: msg.results }));
        }
      }
    };

    connect();
  </script>
</body>
</html>
